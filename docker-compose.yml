services:
  db:
    image: postgres:16-alpine
    container_name: mathpath-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mathpath}
      POSTGRES_USER: ${POSTGRES_USER:-mathpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathpath}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: mathpath-backend
    depends_on:
      - db
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      POSTGRES_DB: ${POSTGRES_DB:-mathpath}
      POSTGRES_USER: ${POSTGRES_USER:-mathpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathpath}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    container_name: mathpath-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

